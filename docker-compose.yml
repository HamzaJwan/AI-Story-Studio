# AI Story Studio — Development Compose Skeleton
# ملاحظة: هذا Compose هيكلي للمرحلة الأولى، وليس تشغيل نهائي لكل نماذج AI.
# Codex يجب أن يراجع docs/DEPLOYMENT_WINDOWS_DOCKER.md قبل التعديل.

services:
  backend:
    build:
      context: ./backend
    container_name: ai-story-studio-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8810}:8810"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-story-studio-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: unless-stopped
